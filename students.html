<h2>Info for Students</h2>
<p>
    This page contains information for students, such as concert
    times and songs, news about orchestra events, and more.
</p>
<script>
  (function() {
    const secretCode = [
      "ArrowUp", "ArrowUp",
      "ArrowDown", "ArrowDown",
      "ArrowLeft", "ArrowRight",
      "ArrowLeft", "ArrowRight"
    ];

    let entered = [];

    document.addEventListener("keydown", function(e) {
      entered.push(e.key);

      // Trim array to length of secretCode
      if (entered.length > secretCode.length) {
        entered.shift();
      }

      // Check if it matches
      if (JSON.stringify(entered) === JSON.stringify(secretCode)) {
        window.location.href = "secrets.html";
      }
    });
  })();
</script>
